		<!-- Video popup container -->
		<div id="video-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
				background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:9999;">
			<div class="video-card" style="background:#fff; border-radius:12px; max-width:90%; max-height:80%; position:relative; box-shadow:0 0 20px rgba(0,0,0,0.5);">
				<span class="close-button" style="position:absolute; top:0.5em; right:1em; font-size:2em; cursor:pointer; color:#333;">&times;</span>
				<video id="popup-video" controls style="width:100%; height:auto;"></video>
			</div>
		</div>

		<script>
		const thumbs = document.querySelectorAll('.project-thumb');
		const popup = document.getElementById('video-popup');
		const popupVideo = document.getElementById('popup-video');
		const closeBtn = document.querySelector('#video-popup .close-button');

		// Open video popup
		thumbs.forEach(t => {
		t.addEventListener('click', () => {
			const src = t.getAttribute('data-video');
			popupVideo.src = src;
			popup.style.display = 'flex';
			popupVideo.play();
		});
		});

		// Close when clicking the close button
		closeBtn.addEventListener('click', () => {
		popupVideo.pause();
		popupVideo.src = "";
		popup.style.display = 'none';
		});

		// Close when clicking outside the card
		popup.addEventListener('click', (e) => {
		if (e.target === popup) {
			popupVideo.pause();
			popupVideo.src = "";
			popup.style.display = 'none';
		}
		});
		</script>
